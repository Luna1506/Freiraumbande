services:
  postgres:
    image: postgres:16.1
    container_name: freiraumbande-db
    environment:
      POSTGRES_DB: freiraumbande
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: freiraumbande-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/freiraumbande
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
    depends_on:
      - postgres
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: freiraumbande-frontend
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data: